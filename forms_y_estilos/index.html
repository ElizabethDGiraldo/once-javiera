<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contáctanos</title>
  <link rel="stylesheet" href="styles.css">

  <!--fuentes-->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Trispace:wght@100..800&display=swap" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;1,100;1,200;1,300;1,400;1,500;1,600;1,700&family=Trispace:wght@100..800&display=swap" rel="stylesheet">


</head>
<body>

  <main class="contenedor">

    <header class="encabezado">
      <h1>Ingresa y tu información 😼</h1>
      <p>La respuesta sera inmediata</p>
    </header>

    <form class="formulario-contacto" action="#" method="post" novalidate>

      <!-- Nombre y Email en una fila -->
      <div class="fila-doble">

        <div class="campo">
          <label for="contacto-nombre">
            Nombre completo <span class="obligatorio">*</span>
          </label>
          <input 
            type="text" 
            id="contacto-nombre" 
            name="nombre"
            placeholder="¿Cómo te llamas?"
            required
            autocomplete="name"
            minlength="2"
            maxlength="60">
          
        </div>

        <div class="campo">
          <label for="contacto-email">
            Correo electrónico <span class="obligatorio">*</span>
          </label>
          <input 
            type="email" 
            id="contacto-email" 
            name="email"
            placeholder="correo@ejemplo.com"
            required
            autocomplete="email">
        </div>

      </div>

      <!-- Tipo de consulta -->
      <div class="campo">
        <label for="razon de consulta">
          Tipo de consulta <span class="obligatorio">*</span>
        </label>
        <select id="tipo-consulta" name="tipo_consulta" required>
          <option value="">Razon de petición</option>
          <optgroup label="Crecimiento personal">
            <option value="objetivos">alcanzar objetivos</option>
            <option value="proyecto">construir un proyecto</option>
          </optgroup>
          <optgroup label="Crecimiento laboral">
            <option value="experiencia">adquirir experiencia laboral</option>
            <option value="emprendimiento">comenzar uin emprendimiento</option>
          </optgroup>
          <optgroup label="Otros">
          
            <option value="otro">Otro motivo</option>
          </optgroup>
        </select>
      </div>

      <!-- Asunto -->
      <div class="campo">
        <label for="asunto">Asunto</label>
        <input 
          type="text" 
          id="asunto" 
          name="asunto"
          placeholder="Resume tu consulta en una frase"
          maxlength="100">
      </div>

      <!-- Mensaje -->
      <div class="campo">
        <label for="mensaje">
          La razón por la que deberiamos contratarte: <span class="obligatorio">*</span>
        </label>
        <textarea 
          id="mensaje" 
          name="mensaje"
          rows="6"
          placeholder="Describe con detalle las razones..."
          required
          minlength="20"
          maxlength="1000">
        </textarea>
        <span class="ayuda">Mínimo 20 caracteres · Máximo 1000</span>
      </div>

      <!-- Cómo prefiere ser contactado -->
      <div class="campo">
        <p class="label-grupo">¿Cómo prefieres que te contactemos?</p>

        <div class="opciones-radio">
          <input type="radio" id="via-email" name="via_contacto" value="email" checked>
          <label for="via-email">📫 Por email</label>

          <input type="radio" id="via-whatsapp" name="via_contacto" value="whatsapp">
          <label for="via-whatsapp">📱 Por WhatsApp</label>

          <input type="radio" id="via-llamada" name="via_contacto" value="llamada">
          <label for="via-llamada">📞 Llamada telefónica</label>
        </div>
      </div>

      <!-- Teléfono condicional -->
      <div class="campo" id="campo-telefono">
        <label for="telefono">Teléfono</label>
        <input 
          type="tel" 
          id="telefono" 
          name="telefono"
        
          pattern="[0-9\s\-\+]{7,15}">
        <span class="ayuda">Solo si elegiste WhatsApp o llamada</span>
      </div>

      <!-- Términos y condiciones -->
      <div class="campo campo-check">
        <input type="checkbox" id="terminos" name="terminos" value="acepto" required>
        <label for="terminos">
          He leído y acepto la 
          <a href="#" target="_blank">política de privacidad</a> 
          y los 
          <a href="#" target="_blank">términos de uso</a>
          <span class="obligatorio">*</span>
        </label>
      </div>

      
      <!-- Botones de acción -->
      <div class="acciones">
        <button type="submit" class="btn-primario">
           Enviar mensaje
        </button>
        <button type="reset" class="btn-secundario">
           Borrar todo
        </button>
      </div>

    </form>

  </main>

</body>
</html>
