<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clasificación Torneo Videojuegos</title>
    <style>
        
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            font-family: Tahoma, sans-serif;
            box-shadow: 0 4px 8px rgba(124, 68, 68, 0.1);
        }

        
        th, td {
            border: 1px solid #ff00bf;
            padding: 10px;
            
        }

        thead {
            background-color: #851c65;
            color: white;
        }

        
        tbody tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tbody tr:hover {
            background-color: #cfb4b4;
        }

        tfoot {
            background-color: #ecf0f1;
            font-weight: bold;
        }

        .main-title {
            font-size: 1.5em;
            text-transform:lowercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

        </thead>

</body>
</html>
